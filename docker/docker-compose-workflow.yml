name: mirap-workflow

services:
  workflow-mysql:
    image: mysql:8.4.5
    container_name: mirap-workflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${WORKFLOW_MYSQL_ROOT_PASSWORD:-mirap}
      MYSQL_DATABASE: ${WORKFLOW_MYSQL_DATABASE:-mirap_workflow}
      MYSQL_USER: ${WORKFLOW_MYSQL_USER:-mirap}
      MYSQL_PASSWORD: ${WORKFLOW_MYSQL_PASSWORD:-mirap123}
    ports:
      - "${WORKFLOW_MYSQL_PORT:-3307}:3306"
    volumes:
      - ./data-workflow/mysql:/var/lib/mysql
      - ../migrations/workflow_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u$${MYSQL_USER}",
          "-p$${MYSQL_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mirap-workflow-network

  workflow-redis:
    image: bitnamilegacy/redis:8.0
    container_name: mirap-workflow-redis
    restart: unless-stopped
    user: root
    environment:
      REDIS_AOF_ENABLED: ${WORKFLOW_REDIS_AOF_ENABLED:-no}
      REDIS_PORT_NUMBER: 6379
      REDIS_IO_THREADS: ${WORKFLOW_REDIS_IO_THREADS:-4}
      ALLOW_EMPTY_PASSWORD: ${WORKFLOW_REDIS_ALLOW_EMPTY_PASSWORD:-yes}
    ports:
      - "${WORKFLOW_REDIS_PORT:-6380}:6379"
    volumes:
      - ./data-workflow/redis:/bitnami/redis/data:rw,Z
    command: >
      bash -c "
        /opt/bitnami/scripts/redis/setup.sh
        chown -R redis:redis /bitnami/redis/data
        chmod g+s /bitnami/redis/data
        exec /opt/bitnami/scripts/redis/entrypoint.sh /opt/bitnami/scripts/redis/run.sh
      "
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - mirap-workflow-network

networks:
  mirap-workflow-network:
    name: mirap-workflow-network
